<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub | Backend Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root { --primary: #39FF14; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; min-height: 100vh; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 30px 30px; }
        .container { max-width: 1000px; margin-left: 10%; padding: 20px; }
        h1 { font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .skills { color: var(--primary); font-weight: bold; margin: 15px 0; letter-spacing: 2px; font-size: 1rem; }
        p { font-size: 1.2rem; color: #aaa; max-width: 550px; line-height: 1.6; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 20px; }
        .btn { padding: 15px 35px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: 0.3s; border: 2px solid var(--primary); }
        .btn-why { background: var(--primary); color: #000; }
        .btn-projects { color: var(--primary); background: transparent; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(57, 255, 20, 0.4); }
        
        /* قسم المهارات النيون الجانبي - الهيبة */
        .side-skills { position: fixed; right: 5%; top: 50%; transform: translateY(-50%); border-left: 2px solid var(--primary); padding-left: 30px; }
        .skill-bar { margin-bottom: 25px; width: 250px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; color: var(--primary); }
        .bar-bg { height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>BACKEND <span class="highlight">DEVELOPER</span></h1>
        <div class="skills">JAVA • SQL • SECURITY • OPTIMIZATION</div>
        <p>I build high-performance core systems for Minecraft networks. Specialized in database synchronization, anti-lag infrastructure, and network security.</p>
        <div class="btn-group">
            <a href="why-me.html" class="btn btn-why">WHY ME?</a>
            <a href="https://github.com" class="btn btn-projects">MY PROJECTS</a>
        </div>
    </div>

    <div class="side-skills">
        <div class="skill-bar">
            <div class="bar-label">Java <span>95%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 95%;"></div></div>
        </div>
        <div class="skill-bar">
            <div class="bar-label">YAML <span>90%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 90%;"></div></div>
        </div>
        <div class="skill-bar">
            <div class="bar-label">Optimization <span>85%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width: 85%;"></div></div>
        </div>
    </div>
</body>
</html>

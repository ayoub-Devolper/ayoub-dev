<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub_200 | Minecraft Developer</title>
    <style>
        :root {
            --primary: #00ff88; 
            --bg: #050505; 
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        /* اسم الديسكورد في الزاوية العليا اليسرى */
        .discord-tag {
            position: absolute;
            top: 25px;
            left: 25px;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 1px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
            font-size: 1.1rem;
        }

        .container {
            max-width: 900px;
            padding: 20px;
        }

        h1 { font-size: 4.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: -3px; }
        .highlight { color: var(--primary); }
        .skills { color: var(--primary); font-weight: bold; margin-bottom: 30px; letter-spacing: 3px; font-size: 1rem; }
        p { font-size: 1.2rem; color: #aaa; line-height: 1.6; margin-bottom: 45px; max-width: 700px; margin-left: auto; margin-right: auto; }
        
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        
        .btn {
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid var(--primary);
            font-size: 1rem;
            text-transform: uppercase;
        }

        /* زر Why Me باللون الأخضر الكامل */
        .btn-why {
            background-color: var(--primary);
            color: black;
        }

        /* زر المشاريع مفرغ (Outline) */
        .btn-projects {
            color: var(--primary);
            background: transparent;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
            background: var(--primary);
            color: black;
        }
    </style>
</head>
<body>

    <!-- اسم الديسكورد في الزاوية العليا اليسرى -->
    <div class="discord-tag">DISCORD: ayoub_200</div>

    <div class="container">
        <h1>BACKEND <span class="highlight">DEVELOPER</span></h1>
        <div class="skills">JAVA • SQL • SECURITY • OPTIMIZATION</div>
        
        <p>I build high-performance core systems for Minecraft networks. Specialized in database synchronization, anti-lag infrastructure, and network security.</p>

        <div class="btn-group">
            <!-- زر Why Me بجانب زر المشاريع -->
            <a href="why-me.html" class="btn btn-why">Why Me?</a>
            <a href="https://github.com" class="btn btn-projects">My Projects</a>
        </div>
    </div>

</body>
</html>

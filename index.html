<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayoub_200 | Minecraft Developer</title>
    <style>
        :root {
            --primary: #00ff88; /* الأخضر الفسفوري مثل موقع فخري */
            --bg: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .highlight {
            color: var(--primary);
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 30px;
        }

        .skills {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: black;
        }

        .btn-secondary {
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BACKEND <span class="highlight">DEVELOPER</span></h1>
        <div class="skills">Java • SQL • Server Optimization • Security</div>
        
        <p>I build high-performance core systems for Minecraft networks. Specialized in database synchronization, anti-lag infrastructure, and network security.</p>

        <div class="btn-group">
            <a href="My discord .ayoub_200" class="btn btn-primary">Hire Me</a>
            <a href="https://github.com/ayoub-Devolper/UltimisMC-Core-Systems/tree/main" class="btn btn-secondary">My Projects</a>
        </div>
    </div>

</body>
</html>
